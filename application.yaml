apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app-3
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/JMANI-11/nginx-app.git   # ✅ YOUR REPO
    targetRevision: main
    path: .                                              # ✅ files are in root

  destination:
    server: https://kubernetes.default.svc
    namespace: mani-argocd-3                                  # ⚠️ change if needed

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
